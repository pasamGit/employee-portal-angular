<section class="auth-card">
  <h2>Login</h2>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <form (ngSubmit)="submit()" #loginForm="ngForm">
    <label>
      Email
      <input
        type="email"
        name="email"
        [(ngModel)]="form.email"
        required
      />
    </label>

    <label>
      Password
      <input
        type="password"
        name="password"
        [(ngModel)]="form.password"
        required
      />
    </label>

    <button type="submit" [disabled]="loginForm.invalid">Login</button>
  </form>
</section>
